<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Whack-a-Prof</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HOME SCREEN -->
  <div id="home" class="screen active">
    <h1>Whack-A-Prof</h1>
    <div class="btn-row">
      <button onclick="showScreen('game')">Start</button>
      <button>Leaderboard</button>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="game" class="screen">
    <div id="grid">
      <div class="hole"></div>
      <div class="hole"></div>
      <div class="hole"></div>
      <div class="hole"></div>
      <div class="hole"></div>
      <div class="hole"></div>
      <div class="hole"></div>
      <div class="hole"></div>
      <div class="hole"></div>
    </div>
    <div id="sidebar">
      <div class="stat-box">
        <div class="label">TIMER</div>
        <div class="value">60</div>
      </div>
      <div class="stat-box">
        <div class="label">SCORE</div>
        <div class="value">0</div>
      </div>
      <button>Reset</button>
      <button onclick="showScreen('home')">Home</button>
    </div>
  </div>

  <script>
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }
  </script>
</body>
</html>
